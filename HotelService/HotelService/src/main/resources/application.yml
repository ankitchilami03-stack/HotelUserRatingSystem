server:
  port: 8082

spring:
  application:
    name: HOTELSERVICE
  #import config server in github
  config:
    import: optional:configserver:http://localhost:8085
  datasource:
    url: jdbc:postgresql://localhost:5432/microservices
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


